name: Build EXE

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build & Publish
      run: |
        dotnet publish DragUploadToNas/DragUploadToNas.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DragUploadToNas
        path: ./output/DragUploadToNas.exe
